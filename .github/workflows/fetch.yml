name: Typhoon Data Fetch

on:
  schedule:
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
  workflow_dispatch:

jobs:
  fetch-typhoon:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch JMA, NHC, JTWC data
        run: |
          # JMA 태풍 API
          curl -s -o /tmp/jma.json \
            -H "User-Agent: Mozilla/5.0" \
            "https://www.jma.go.jp/bosai/typhoon/data/index.json" \
            --max-time 30 || echo "JMA failed"

          # JTWC 서태평양 현황 텍스트 (wp = western pacific)
          curl -s -o /tmp/jtwc_wp.txt \
            -H "User-Agent: Mozilla/5.0" \
            "https://www.metoc.navy.mil/jtwc/products/wp9026web.txt" \
            --max-time 30 || echo "JTWC wp failed"

          # JTWC active storms 목록
          curl -s -o /tmp/jtwc_rss.xml \
            -H "User-Agent: Mozilla/5.0" \
            "https://www.metoc.navy.mil/jtwc/rss/jtwc.rss" \
            --max-time 30 || echo "JTWC rss failed"

          # 한국 기상청 태풍 페이지
          curl -s -o /tmp/kma.html \
            -H "User-Agent: Mozilla/5.0" \
            "https://www.weather.go.kr/w/typhoon/typhoon-list.do" \
            --max-time 30 || echo "KMA failed"

          # 한국 기상청 태풍 상세 API
          curl -s -o /tmp/kma_detail.json \
            -H "User-Agent: Mozilla/5.0" \
            "https://www.weather.go.kr/w/typhoon/typhoon-list.do?typ=1" \
            --max-time 30 || echo "KMA detail failed"
            -H "User-Agent: Mozilla/5.0" \
            "https://www.nhc.noaa.gov/index-at.xml" \
            --max-time 30 || echo "NHC failed"

          # RSMC Tokyo 태풍 정보 페이지
          curl -s -o /tmp/rsmc.html \
            -H "User-Agent: Mozilla/5.0" \
            "https://www.jma.go.jp/en/typh/" \
            --max-time 30 || echo "RSMC failed"

      - name: Parse and save typhoon.json
        run: |
          python3 << 'PYEOF'
          import json, re, math, os
          from datetime import datetime, timezone, timedelta

          KAGOSHIMA = (31.6, 130.56)

          def haversine(la1, lo1, la2, lo2):
              R = 6371
              dL = math.radians(la2 - la1)
              dO = math.radians(lo2 - lo1)
              a = math.sin(dL/2)**2 + math.cos(math.radians(la1)) * math.cos(math.radians(la2)) * math.sin(dO/2)**2
              return round(R * 2 * math.asin(math.sqrt(a)))

          def is_dup(typhoons, lat, lon, threshold=2.0):
              return any(abs(t['lat']-lat) < threshold and abs(t['lon']-lon) < threshold for t in typhoons)

          typhoons = []
          sources = {}

          # ── 1. JMA API ──
          try:
              raw = open('/tmp/jma.json').read().strip()
              if raw and raw[0] in '[{':
                  data = json.loads(raw)
                  arr = data if isinstance(data, list) else data.get('typhoon', data.get('data', []))
                  for t in arr:
                      if not t: continue
                      lat = float(t.get('lat') or t.get('latitude') or 0)
                      lon = float(t.get('lon') or t.get('longitude') or 0)
                      if not lat or not lon: continue
                      if is_dup(typhoons, lat, lon): continue
                      typhoons.append({
                          'source': 'JMA',
                          'name': t.get('name') or t.get('eName') or t.get('jName') or 'Typhoon',
                          'lat': round(lat,1), 'lon': round(lon,1),
                          'dist': haversine(KAGOSHIMA[0], KAGOSHIMA[1], lat, lon),
                          'pressure': str(t.get('pressure') or t.get('centralPressure') or '--'),
                          'wind': str(t.get('wind') or t.get('maxWind') or '--'),
                      })
                  sources['jma'] = True
                  print(f"JMA OK: {len(typhoons)} typhoons")
              else:
                  sources['jma'] = False
                  print(f"JMA: empty response (태풍 없음 또는 API 응답 없음)")
          except Exception as e:
              sources['jma'] = False
              print(f"JMA error: {e}")

          # ── 2. RSMC Tokyo HTML 파싱 (JMA 공식 영문 태풍 페이지) ──
          try:
              html = open('/tmp/rsmc.html').read()
              # 위치 패턴: "14.5N 143.2E" 형식
              matches = re.findall(
                  r'(?:TROPICAL STORM|TYPHOON|DEPRESSION|TD|TS|T\.S\.|TY)[^\n]*?([A-Z]{3,})[^\n]*?'
                  r'(\d+\.?\d*)[°\s]*N[,\s]+(\d+\.?\d*)[°\s]*E', html, re.I)
              rsmc_count = 0
              for m in matches:
                  name, lat_s, lon_s = m
                  lat, lon = float(lat_s), float(lon_s)
                  if not (0 <= lat <= 45 and 100 <= lon <= 180): continue
                  if is_dup(typhoons, lat, lon): continue
                  typhoons.append({
                      'source': 'RSMC',
                      'name': name,
                      'lat': round(lat,1), 'lon': round(lon,1),
                      'dist': haversine(KAGOSHIMA[0], KAGOSHIMA[1], lat, lon),
                      'pressure': '--', 'wind': '--',
                  })
                  rsmc_count += 1
              sources['rsmc'] = True
              print(f"RSMC HTML OK: {rsmc_count} added")
          except Exception as e:
              sources['rsmc'] = False
              print(f"RSMC error: {e}")

          # ── 3. JTWC RSS XML 파싱 ──
          try:
              xml = open('/tmp/jtwc_rss.xml').read()
              items = re.findall(r'<item>(.*?)</item>', xml, re.DOTALL)
              jtwc_count = 0
              for item in items:
                  title = (re.search(r'<title>(.*?)</title>', item) or re.search(r'','')).group(1) if re.search(r'<title>(.*?)</title>', item) else ''
                  desc  = (re.search(r'<description>(.*?)</description>', item, re.DOTALL) or re.search(r'','')).group(1) if re.search(r'<description>(.*?)</description>', item, re.DOTALL) else ''
                  text  = title + ' ' + desc
                  if not re.search(r'WARNING|ADVISORY|TYPHOON|TROPICAL|DEPRESSION', text, re.I): continue
                  # 위치 파싱
                  la = re.search(r'(\d+\.?\d*)\s*N', text)
                  lo = re.search(r'(\d+\.?\d*)\s*E', text)
                  if not la or not lo: continue
                  lat, lon = float(la.group(1)), float(lo.group(1))
                  if not (0 <= lat <= 45 and 100 <= lon <= 180): continue
                  if is_dup(typhoons, lat, lon): continue
                  # 이름
                  nm = re.search(r'(?:TYPHOON|TROPICAL STORM|TD|TS|TY)\s+([A-Z]+)', text)
                  name = nm.group(1) if nm else re.sub(r'\s*(WARNING|ADVISORY).*','',title,flags=re.I).strip()
                  # 기압/풍속
                  pm = re.search(r'(\d{3,4})\s*MB', text, re.I)
                  wm = re.search(r'(\d+)\s*(?:KT|KNOTS?)', text, re.I)
                  pressure = pm.group(1) if pm else '--'
                  wind = str(round(int(wm.group(1))*0.514, 1)) if wm else '--'
                  typhoons.append({
                      'source': 'JTWC',
                      'name': name or 'WP System',
                      'lat': round(lat,1), 'lon': round(lon,1),
                      'dist': haversine(KAGOSHIMA[0], KAGOSHIMA[1], lat, lon),
                      'pressure': pressure, 'wind': wind,
                  })
                  jtwc_count += 1
              sources['jtwc'] = True
              print(f"JTWC RSS OK: {jtwc_count} added")
          except Exception as e:
              sources['jtwc'] = False
              print(f"JTWC error: {e}")

          # ── 4. 한국 기상청 태풍 HTML 파싱 ──
          try:
              html = open('/tmp/kma.html', encoding='utf-8', errors='ignore').read()
              # 위도/경도 패턴 찾기
              # 예: "14.5°N 143.2°E" 또는 "14.5N 143.2E"
              pattern = re.findall(
                  r'(\d+\.?\d*)\s*°?\s*[Nn]\s*[,/\s]\s*(\d+\.?\d*)\s*°?\s*[Ee]',
                  html)
              kma_count = 0
              for lat_s, lon_s in pattern:
                  lat, lon = float(lat_s), float(lon_s)
                  if not (0 <= lat <= 45 and 100 <= lon <= 180): continue
                  if is_dup(typhoons, lat, lon): continue
                  # 이름 추출 (메칼라 등)
                  nm = re.search(r'메칼라|MEKKHALA|MEKHALA|제\s*7\s*호', html, re.I)
                  name = 'MEKKHALA' if nm else 'KMA System'
                  typhoons.append({
                      'source': 'KMA',
                      'name': name,
                      'lat': round(lat,1), 'lon': round(lon,1),
                      'dist': haversine(KAGOSHIMA[0], KAGOSHIMA[1], lat, lon),
                      'pressure': '--', 'wind': '--',
                  })
                  kma_count += 1
                  if kma_count >= 3: break  # 최대 3개
              sources['kma'] = True
              print(f"KMA OK: {kma_count} added")
          except Exception as e:
              sources['kma'] = False
              print(f"KMA error: {e}")

          # ── 5. NHC (대서양 백업) ──
          try:
              txt = open('/tmp/jtwc_wp.txt').read()
              if 'LAT' in txt and 'LON' in txt:
                  la = re.search(r'LAT[:\s]+(\d+\.?\d*)[Nn]', txt)
                  lo = re.search(r'LON[:\s]+(\d+\.?\d*)[Ee]', txt)
                  if la and lo:
                      lat, lon = float(la.group(1)), float(lo.group(1))
                      if 0 <= lat <= 45 and 100 <= lon <= 180 and not is_dup(typhoons, lat, lon):
                          nm = re.search(r'(?:TYPHOON|TROPICAL STORM|TD)\s+([A-Z]+)', txt)
                          pm = re.search(r'(\d{3,4})\s*MB', txt)
                          wm = re.search(r'MAX SUSTAINED WINDS\s+(\d+)\s*KT', txt)
                          typhoons.append({
                              'source': 'JTWC_TXT',
                              'name': nm.group(1) if nm else 'WP System',
                              'lat': round(lat,1), 'lon': round(lon,1),
                              'dist': haversine(KAGOSHIMA[0], KAGOSHIMA[1], lat, lon),
                              'pressure': pm.group(1) if pm else '--',
                              'wind': str(round(int(wm.group(1))*0.514,1)) if wm else '--',
                          })
                          print(f"JTWC TXT: 1 added")
                      sources['jtwc_txt'] = True
          except Exception as e:
              sources['jtwc_txt'] = False
              print(f"JTWC TXT error: {e}")

          # ── 5. NHC (대서양 백업) ──
          try:
              xml = open('/tmp/nhc.xml').read()
              items = re.findall(r'<item>(.*?)</item>', xml, re.DOTALL)
              nhc_count = 0
              for item in items:
                  tm = re.search(r'<title>(.*?)</title>', item)
                  dm = re.search(r'<description>(.*?)</description>', item, re.DOTALL)
                  if not tm or not dm: continue
                  if not re.search(r'typhoon|tropical|storm|depression', tm.group(1), re.I): continue
                  la = re.search(r'([\d.]+)\s*[Nn]', dm.group(1))
                  lo = re.search(r'([\d.]+)\s*[Ee]', dm.group(1))
                  if not la or not lo: continue
                  lat, lon = float(la.group(1)), float(lo.group(1))
                  if not (100 <= lon <= 180): continue
                  if is_dup(typhoons, lat, lon): continue
                  typhoons.append({
                      'source': 'NHC',
                      'name': re.sub(r'\s*advisory.*','',tm.group(1),flags=re.I).strip(),
                      'lat': round(lat,1), 'lon': round(lon,1),
                      'dist': haversine(KAGOSHIMA[0], KAGOSHIMA[1], lat, lon),
                      'pressure': '--', 'wind': '--',
                  })
                  nhc_count += 1
              sources['nhc'] = True
              print(f"NHC OK: {nhc_count} added")
          except Exception as e:
              sources['nhc'] = False
              print(f"NHC error: {e}")

          now_utc = datetime.now(timezone.utc)
          now_jst = now_utc + timedelta(hours=9)

          output = {
              'updated_utc': now_utc.strftime('%Y-%m-%dT%H:%M:%SZ'),
              'updated_jst': now_jst.strftime('%Y/%m/%d %H:%M JST'),
              'typhoon_count': len(typhoons),
              'typhoons': typhoons,
              'sources': sources
          }

          with open('typhoon.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print(f"\n✅ Saved typhoon.json — {len(typhoons)} typhoons")
          if typhoons:
              for t in typhoons:
                  print(f"  → {t['name']} ({t['source']}) lat:{t['lat']} lon:{t['lon']} dist:{t['dist']}km")
          PYEOF

      - name: Commit typhoon.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add typhoon.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update typhoon.json $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
