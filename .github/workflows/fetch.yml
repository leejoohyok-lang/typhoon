name: Typhoon Data Fetch

on:
  schedule:
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
  workflow_dispatch:

jobs:
  fetch-typhoon:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch typhoon data from multiple sources
        run: |
          # 1. JMA bosai API
          curl -s -o /tmp/jma.json \
            -H "User-Agent: Mozilla/5.0" \
            "https://www.jma.go.jp/bosai/typhoon/data/index.json" \
            --max-time 20 || true

          # 2. JMA 영문 태풍 페이지 (HTML)
          curl -s -o /tmp/jma_en.html \
            -H "User-Agent: Mozilla/5.0" \
            "https://www.jma.go.jp/en/typh/" \
            --max-time 20 || true

          # 3. JTWC warning text (서태평양 09W, 10W 등 순서대로 시도)
          for num in 09 10 11 08 07 12; do
            curl -s -o /tmp/jtwc_${num}.txt \
              -H "User-Agent: Mozilla/5.0" \
              "https://www.metoc.navy.mil/jtwc/products/wp${num}26web.txt" \
              --max-time 15 || true
          done

          # 4. 한국 기상청 태풍 정보 페이지
          curl -s -o /tmp/kma.html \
            -H "User-Agent: Mozilla/5.0" \
            "https://www.weather.go.kr/w/typhoon/typhoon-main.do" \
            --max-time 20 || true

          echo "Fetch complete"

      - name: Parse and save typhoon.json
        run: |
          python3 << 'PYEOF'
          import json, re, math, os, glob
          from datetime import datetime, timezone, timedelta

          KAGOSHIMA = (31.6, 130.56)

          def haversine(la1, lo1, la2, lo2):
              R = 6371
              dL = math.radians(la2 - la1)
              dO = math.radians(lo2 - lo1)
              a = math.sin(dL/2)**2 + math.cos(math.radians(la1)) * math.cos(math.radians(la2)) * math.sin(dO/2)**2
              return round(R * 2 * math.asin(math.sqrt(a)))

          def is_dup(lst, lat, lon):
              return any(abs(t['lat']-lat) < 2.0 and abs(t['lon']-lon) < 2.0 for t in lst)

          typhoons = []
          sources = {}

          # ── 1. JMA API ──
          try:
              raw = open('/tmp/jma.json').read().strip()
              if raw and raw[0] in '[{':
                  data = json.loads(raw)
                  arr = data if isinstance(data, list) else data.get('typhoon', data.get('data', []))
                  cnt = 0
                  for t in arr:
                      if not t: continue
                      lat = float(t.get('lat') or t.get('latitude') or 0)
                      lon = float(t.get('lon') or t.get('longitude') or 0)
                      if not lat or not lon: continue
                      if is_dup(typhoons, lat, lon): continue
                      typhoons.append({
                          'source': 'JMA',
                          'name': t.get('name') or t.get('eName') or t.get('jName') or 'Typhoon',
                          'lat': round(lat,1), 'lon': round(lon,1),
                          'dist': haversine(KAGOSHIMA[0], KAGOSHIMA[1], lat, lon),
                          'pressure': str(t.get('pressure') or t.get('centralPressure') or '--'),
                          'wind': str(t.get('wind') or t.get('maxWind') or '--'),
                      })
                      cnt += 1
                  sources['jma'] = True
                  print(f"JMA API: {cnt} typhoons")
              else:
                  sources['jma'] = False
                  print("JMA API: empty (no active typhoon in JMA system)")
          except Exception as e:
              sources['jma'] = False
              print(f"JMA API error: {e}")

          # ── 2. JTWC 텍스트 advisory 파싱 ──
          jtwc_found = 0
          for fpath in glob.glob('/tmp/jtwc_*.txt'):
              try:
                  txt = open(fpath).read()
                  if len(txt) < 100: continue
                  if not re.search(r'(?:TYPHOON|TROPICAL STORM|DEPRESSION|WARNING)', txt, re.I): continue

                  # 위치 파싱 - JTWC 형식: "POSITION: 14.5N 143.2E"
                  la = re.search(r'(?:POSITION[:\s]+|LAT[:\s]+)(\d+\.?\d*)\s*N', txt, re.I)
                  lo = re.search(r'(?:POSITION[:\s]+.*?|LON[:\s]+)(\d+\.?\d*)\s*E', txt, re.I)

                  # 대안 형식: "13.2N 143.5E" 직접 등장
                  if not la:
                      la = re.search(r'(\d+\.?\d*)\s*N\s+(\d+\.?\d*)\s*E', txt)
                      if la:
                          lo_val = la.group(2)
                          la_val = la.group(1)
                          la = type('m', (), {'group': lambda self,x: la_val if x==1 else lo_val})()
                          lo = type('m', (), {'group': lambda self,x: lo_val})()

                  if not la or not lo: continue
                  lat = float(la.group(1) if hasattr(la, 'group') else la)
                  lon_str = lo.group(1) if hasattr(lo, 'group') else lo
                  lon = float(lon_str)

                  if not (0 <= lat <= 45 and 100 <= lon <= 180): continue
                  if is_dup(typhoons, lat, lon): continue

                  # 이름
                  nm = re.search(r'(?:TYPHOON|TROPICAL STORM|TD|TS)\s+([A-Z]{3,})', txt)
                  name = nm.group(1) if nm else os.path.basename(fpath).replace('.txt','').upper()

                  # 기압/풍속
                  pm = re.search(r'(\d{3,4})\s*MB', txt, re.I)
                  wm = re.search(r'MAX(?:IMUM)?\s+(?:SUSTAINED\s+)?WINDS?\s+(\d+)\s*(?:KT|KNOTS?)', txt, re.I)
                  pressure = pm.group(1) if pm else '--'
                  wind_ms = str(round(int(wm.group(1)) * 0.5144, 1)) if wm else '--'

                  typhoons.append({
                      'source': 'JTWC',
                      'name': name,
                      'lat': round(lat,1), 'lon': round(lon,1),
                      'dist': haversine(KAGOSHIMA[0], KAGOSHIMA[1], lat, lon),
                      'pressure': pressure, 'wind': wind_ms,
                  })
                  jtwc_found += 1
                  print(f"JTWC {os.path.basename(fpath)}: {name} at {lat}N {lon}E")
              except Exception as e:
                  print(f"JTWC {fpath} error: {e}")
          sources['jtwc'] = jtwc_found > 0
          print(f"JTWC total: {jtwc_found} added")

          # ── 3. JMA 영문 HTML 파싱 ──
          try:
              html = open('/tmp/jma_en.html', encoding='utf-8', errors='ignore').read()
              # JMA 영문 페이지의 태풍 위치 테이블 파싱
              # 패턴: 숫자N 숫자E (예: 14.5N 143.2E)
              matches = re.findall(r'(\d+\.?\d*)\s*N\s*[,\s]\s*(\d+\.?\d*)\s*E', html)
              jma_en_count = 0
              for lat_s, lon_s in matches:
                  lat, lon = float(lat_s), float(lon_s)
                  if not (5 <= lat <= 40 and 110 <= lon <= 175): continue
                  if is_dup(typhoons, lat, lon): continue
                  # 주변 텍스트에서 이름 찾기
                  idx = html.find(lat_s)
                  ctx = html[max(0,idx-200):idx+100]
                  nm = re.search(r'(?:TYPHOON|TROPICAL STORM|T\.S\.|T\.D\.)\s+([A-Z]{3,})', ctx, re.I)
                  name = nm.group(1) if nm else 'JMA System'
                  typhoons.append({
                      'source': 'JMA_EN',
                      'name': name,
                      'lat': round(lat,1), 'lon': round(lon,1),
                      'dist': haversine(KAGOSHIMA[0], KAGOSHIMA[1], lat, lon),
                      'pressure': '--', 'wind': '--',
                  })
                  jma_en_count += 1
                  if jma_en_count >= 5: break
              sources['jma_en'] = True
              print(f"JMA EN HTML: {jma_en_count} added")
          except Exception as e:
              sources['jma_en'] = False
              print(f"JMA EN error: {e}")

          # ── 4. 한국 기상청 HTML 파싱 ──
          try:
              html = open('/tmp/kma.html', encoding='utf-8', errors='ignore').read()
              # 위도/경도 패턴
              matches = re.findall(r'(\d+\.?\d*)\s*°?\s*N[,\s/]+(\d+\.?\d*)\s*°?\s*E', html)
              kma_count = 0
              for lat_s, lon_s in matches:
                  lat, lon = float(lat_s), float(lon_s)
                  if not (5 <= lat <= 40 and 110 <= lon <= 175): continue
                  if is_dup(typhoons, lat, lon): continue
                  # 이름 감지
                  if re.search(r'메칼라|MEKKHALA|MEKHALA', html, re.I):
                      name = 'MEKKHALA'
                  else:
                      name = 'KMA System'
                  typhoons.append({
                      'source': 'KMA',
                      'name': name,
                      'lat': round(lat,1), 'lon': round(lon,1),
                      'dist': haversine(KAGOSHIMA[0], KAGOSHIMA[1], lat, lon),
                      'pressure': '--', 'wind': '--',
                  })
                  kma_count += 1
                  if kma_count >= 3: break
              sources['kma'] = True
              print(f"KMA: {kma_count} added")
          except Exception as e:
              sources['kma'] = False
              print(f"KMA error: {e}")

          # ── 결과 저장 ──
          now_utc = datetime.now(timezone.utc)
          now_jst = now_utc + timedelta(hours=9)

          output = {
              'updated_utc': now_utc.strftime('%Y-%m-%dT%H:%M:%SZ'),
              'updated_jst': now_jst.strftime('%Y/%m/%d %H:%M JST'),
              'typhoon_count': len(typhoons),
              'typhoons': typhoons,
              'sources': sources
          }

          with open('typhoon.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print(f"\n✅ typhoon.json saved — {len(typhoons)} typhoons total")
          for t in typhoons:
              print(f"  🌀 {t['name']} ({t['source']}) {t['lat']}N {t['lon']}E → 가고시마 {t['dist']}km")
          PYEOF

      - name: Commit typhoon.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add typhoon.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update typhoon.json $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
